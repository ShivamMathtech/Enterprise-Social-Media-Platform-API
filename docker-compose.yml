services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: social_db
      POSTGRES_USER: social_user
      POSTGRES_PASSWORD: social_password
    volumes:
      - social_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_user -d social_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - social_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - social_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  social-worker:
    build: .
    env_file: .env
    command: python -m scripts.run_social_worker
    entrypoint: []
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  outbox-worker:
    build: .
    env_file: .env
    command: python -m scripts.run_outbox_worker
    entrypoint: []
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  social_postgres_data:
  social_redis_data:
  social_uploads:
