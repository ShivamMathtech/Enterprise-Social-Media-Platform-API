name: CI
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
        env:
          DATABASE_URL: sqlite:///./ci.db
          SECRET_KEY: ci-secret-key-that-is-at-least-thirty-two-characters
          ENCRYPTION_SECRET: ci-encryption-secret-at-least-thirty-two-characters
          ENVIRONMENT: test
      - run: pytest -q
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-secret-key-that-is-at-least-thirty-two-characters
          ENCRYPTION_SECRET: ci-encryption-secret-at-least-thirty-two-characters
          ENVIRONMENT: test
          EXPOSE_DEBUG_TOKENS: 'true'
